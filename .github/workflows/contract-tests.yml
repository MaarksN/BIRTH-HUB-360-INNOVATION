# Contract Testing Pipeline (Pact)

name: Contract Tests

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    name: Pact Contract Tests

    services:
      postgres:
        image: postgres:17-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
        env:
          POSTGRES_DB: birthub_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 9.15.9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build applications
        run: pnpm build

      - name: Run contract tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/birthub_test
        run: pnpm packs:test

      - name: Upload contract results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pact-results
          path: |
            pacts/
            coverage/
        continue-on-error: true
