title = "BirthHub 360 gitleaks configuration"

[allowlist]
description = "Repository-level allowlist for documented placeholders, fixtures and imported archives."
paths = [
  '''^artifacts/''',
  '''^docs/''',
  '''^imports/''',
  '''^.*\.md$''',
  '''^.*\.example$''',
  '''^apps/.*/test/''',
  '''^apps/.*/tests/''',
  '''^packages/.*/test/''',
  '''^packages/.*/tests/''',
  '''^pnpm-lock\.yaml$'''
]
regexes = [
  '''(?i)(replace-me|placeholder|changeme|dummy|example|sample|fake|fixture)''',
  '''(?i)\b(dev|test|mock)[-_][a-z0-9_-]{4,}\b''',
  '''sk_test_birthub360(_mock)?''',
  '''whsec_birthub360''',
  '''postgresql://postgres:postgres@localhost:5432/[a-z0-9_-]+''',
  '''redis://localhost:6379'''
]
